<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblioteca — Colección de Obras Escogidas</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="site-header">
    <div class="header-ornament">❧</div>
    <h1 class="site-title">Biblioteca</h1>
    <p class="site-subtitle">Colección del pejelagarto</p>
    <div class="header-rule"></div>
  </header>

  <main class="main-content">

    <!-- Shelf -->
    <section class="shelf-section">
      <div class="shelf-wrapper">
        <div class="shelf-items" id="shelfItems"></div>
        <div class="shelf-plank"></div>
      </div>
    </section>

    <!-- Player -->
    <section class="player-section" id="playerSection">
      <div class="player-label" id="playerLabel">
        <span class="now-playing-tag">Reproduciendo</span>
        <span class="player-title-text" id="playerTitleText">—</span>
      </div>
      <div class="player-frame-wrapper">
        <div class="vhs-frame">
          <div class="vhs-top-bar">
            <span class="vhs-brand">VHS</span>
            <span class="vhs-reel left-reel">◉</span>
            <span class="vhs-reel right-reel">◉</span>
          </div>
          <div class="iframe-container">
            <iframe
              id="videoPlayer"
              src=""
              allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
              allowfullscreen
              frameborder="0"
            ></iframe>
          </div>
        </div>
        <div class="player-shadow"></div>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p>— Obras Escogidas —</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
